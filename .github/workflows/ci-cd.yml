name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Backend lint & type check
        run: |
          cd backend
          pip install -r requirements.txt mypy ruff
          ruff check .
          mypy app/ --ignore-missing-imports

      - name: Backend tests
        run: |
          cd backend
          pip install -r requirements.txt pytest pytest-asyncio
          pytest tests/ -v

      - name: Frontend install
        run: |
          cd frontend
          npm ci

      - name: Frontend lint
        run: |
          cd frontend
          npm run lint

      - name: Frontend build
        run: |
          cd frontend
          npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      - name: Bandit Python security
        run: |
          pip install bandit
          bandit -r backend/app/ -ll

  build-and-push:
    needs: [lint-and-test, security-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # develop → GitHub Container Registry (no AWS credentials needed)
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (GHCR)
        if: github.ref == 'refs/heads/develop'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/tropmed-backend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest backend/
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # main → AWS ECR (commented out until ECR is configured)
      # - uses: aws-actions/configure-aws-credentials@v4
      #   if: github.ref == 'refs/heads/main'
      #   with:
      #     role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      #     aws-region: ${{ env.AWS_REGION }}

      # - uses: aws-actions/amazon-ecr-login@v2
